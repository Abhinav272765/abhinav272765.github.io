name: Publish to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: deploy
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.release.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Apply
        env:
          AFDCAE: ${{ secrets.AFDCAE }}
          B6ACF1: ${{ secrets.B6ACF1 }}
        run: |
          python3 -c "
          import pathlib, os, sys
          sec_a = os.environ.get('AFDCAE', '')
          sec_b = os.environ.get('B6ACF1', '')
          target = pathlib.Path('index.html')
          before = target.read_text(encoding='utf-8')
          after = before
          if sec_a:
              after = after.replace('<!-- 7712f2e3f94003267e2ec3ebcc60c779fdb5296972d47642 -->', sec_a)
          if sec_b:
              after = after.replace('<!-- 7051aa13450afded97aed94d -->', sec_b)
          if after == before and (sec_a or sec_b):
              sys.exit(1)
          if after != before:
              target.write_text(after, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: release
        uses: actions/deploy-pages@v4
